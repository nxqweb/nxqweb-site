# ============================================================
#  NETLIFY CONFIG — drop this in your project root
#  Netlify reads this automatically on deploy
# ============================================================

[build]
  publish = "public"

# ── PAGE ROUTES ──────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/portal.html"
  status = 200

[[redirects]]
  from = "/portal/*"
  to = "/portal.html"
  status = 200

[[redirects]]
  from = "/suspended"
  to = "/suspended.html"
  status = 200

# ── SECURITY HEADERS ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/portal.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"
